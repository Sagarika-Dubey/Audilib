<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" types="x-icon" href="/images/title_part_photo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audilib</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" ></script>
</head>
<body>
    <div class="signup-box">
        <h1>Sign Up</h1>
        <h4>It's free and only takes a minute</h4>
        <form action="/Audilib/signup.php">
          <label>First Name</label>
          <input type="text" placeholder="" name="fname"/>
          <label>Last Name</label>
          <input type="text" placeholder="" name="lname"/>
          <label>Email</label>
          <input type="email" placeholder="" name="email"/>
          <label>Password</label>
          <input type="password" placeholder="" name="password"/>
          <label>Confirm Password</label>
          <input type="password" placeholder="" name="cpassword"/>
          <a href="/idex.html"><input type="button" value="Submit" name='submit'/></a>
        </form>
        <p>
          By clicking the Sign Up button,you agree to our <br />
          <a href="#">Terms and Condition</a> and <a href="#">Policy Privacy</a>
        </p>
      </div>
      <p class="para-2">
        Already have an account? <a href="signin.html">Login here</a>
      </p>
</body>
</html>
